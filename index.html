<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS v4.0 - MATRIX GREEN</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <style>
        :root { --accent: #00ff41; --bg: #000800; --glass: rgba(0, 20, 0, 0.9); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: var(--accent); font-family: monospace; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        
        #setup { position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; }
        .box { border: 2px solid var(--accent); padding: 30px; border-radius: 15px; background: var(--glass); text-align: center; width: 80%; max-width: 350px; box-shadow: 0 0 20px var(--accent); }
        
        input { width: 100%; padding: 15px; margin: 15px 0; background: #000; border: 1px solid var(--accent); color: var(--accent); border-radius: 5px; outline: none; }
        
        #ui { position: absolute; z-index: 10; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: flex-end; pointer-events: none; }
        .chat { width: 90%; align-self: center; margin-bottom: 20px; background: var(--glass); border-radius: 15px; padding: 15px; border: 1px solid var(--accent); pointer-events: auto; }
        
        #log { height: 180px; overflow-y: auto; margin-bottom: 10px; font-size: 13px; scroll-behavior: smooth; }
        .msg { margin-bottom: 8px; border-bottom: 1px solid rgba(0,255,65,0.2); padding-bottom: 5px; }
        .ai { color: #fff; text-shadow: 0 0 5px var(--accent); }
        .err { color: #ff0000; border: 1px solid red; padding: 5px; }

        .btn { background: var(--accent); border: none; color: #000; padding: 15px; border-radius: 5px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; }
        #joystick { position: fixed; bottom: 50px; left: 50px; z-index: 100; display: none; }
    </style>
</head>
<body>

    <canvas id="world"></canvas>

    <div id="setup">
        <div class="box">
            <h2 style="margin: 0;">NEXUS v4.0</h2>
            <p style="font-size: 10px;">FINAL STABLE VERSION</p>
            <input type="password" id="key" placeholder="ВЪВЕДИ GEMINI API KEY">
            <button class="btn" onclick="start()">АКТИВИРАЙ СИСТЕМАТА</button>
        </div>
    </div>

    <div id="joystick"></div>

    <div id="ui">
        <div class="chat">
            <div id="log"><div class="msg ai">СИСТЕМАТА Е ОНЛАЙН.</div></div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="inp" placeholder="КОМАНДА..." style="margin:0;">
                <button onclick="ask()" class="btn" style="width: 60px;">OK</button>
            </div>
            <button class="btn" style="margin-top: 10px;" onclick="play(true)">СТАРТ СИМУЛАЦИЯ</button>
        </div>
    </div>

    <script>
        class Engine {
            constructor(k) { this.k = k; this.init(); }
            init() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 10, 25);
                this.renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('world'), antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.scene.add(new THREE.GridHelper(300, 30, 0x00ff41, 0x002200));
                this.loop();
            }
            async talk() {
                const i = document.getElementById('inp');
                const t = i.value.trim(); if(!t) return;
                this.write(t, "user"); i.value = "";
                
                try {
                    // НАЙ-НОВИЯТ СТАБИЛЕН МОДЕЛ И ВЕРСИЯ
                    const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${this.k}`;
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: t }] }] })
                    });
                    const d = await res.json();
                    if (!res.ok) throw new Error(d.error ? d.error.message : res.status);
                    this.write(d.candidates[0].content.parts[0].text, "ai");
                } catch(e) { this.write("ГРЕШКА: " + e.message, "err"); }
            }
            write(m, t) {
                const l = document.getElementById('log');
                const d = document.createElement('div');
                d.className = `msg ${t}`; d.innerHTML = t === 'ai' ? `<b>NEXUS:</b> ${m}` : m;
                l.appendChild(d); l.scrollTop = l.scrollHeight;
            }
            loop() { requestAnimationFrame(() => this.loop()); this.renderer.render(this.scene, this.camera); }
        }

        function start() {
            const k = document.getElementById('key').value.trim();
            if(!k) return;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';
            window.App = new Engine(k);
        }
        function ask() { window.App.talk(); }
        function play(s) { 
            document.getElementById('ui').style.display = s ? 'none' : 'flex'; 
            document.getElementById('joystick').style.display = s ? 'block' : 'none';
            if(s) nipplejs.create({ zone: document.getElementById('joystick'), mode: 'static', position: {left: '80px', bottom: '80px'}, color: '#00ff41' });
        }
    </script>
</body>
</html>
