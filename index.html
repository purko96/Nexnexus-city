<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS AI | CYBER ENGINE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <style>
        :root {
            --accent: #00f2ff;
            --purple: #bc13fe;
            --bg-dark: #05050a;
            --glass: rgba(15, 15, 25, 0.9);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: var(--bg-dark); color: white;
            font-family: 'Roboto', sans-serif;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        #setup-screen {
            position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .setup-box {
            background: var(--glass); padding: 40px 30px; border-radius: 24px;
            border: 1px solid rgba(0, 242, 255, 0.3); width: 90%; max-width: 400px;
            text-align: center; backdrop-filter: blur(20px);
        }
        h1 { font-family: 'Orbitron', sans-serif; letter-spacing: 4px; color: var(--accent); margin-bottom: 5px; }
        
        input {
            width: 100%; padding: 16px; margin: 10px 0; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(188, 19, 254, 0.4); color: white; border-radius: 12px;
            box-sizing: border-box; outline: none; font-size: 14px;
        }

        #ui-layer {
            position: absolute; z-index: 10; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: flex-end;
            pointer-events: none;
        }
        #ui-layer * { pointer-events: auto; }

        .chat-container {
            width: 92%; max-width: 500px; align-self: center; margin-bottom: 25px;
            background: var(--glass); border-radius: 20px; padding: 15px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px);
        }
        #chat-log {
            height: 160px; overflow-y: auto; margin-bottom: 12px;
            padding-right: 5px; font-size: 14px;
        }
        .msg { margin-bottom: 10px; padding: 10px 14px; border-radius: 12px; line-height: 1.4; }
        .ai-msg { background: rgba(0, 242, 255, 0.1); color: var(--accent); border-left: 3px solid var(--accent); }
        .user-msg { background: rgba(255, 255, 255, 0.05); color: #efefef; text-align: right; }
        .error-msg { background: rgba(255, 0, 0, 0.1); color: #ff6b6b; border: 1px solid #ff4444; }

        .input-group { display: flex; gap: 10px; }
        #chat-input { margin: 0; flex-grow: 1; padding: 12px 18px; border-radius: 30px; background: rgba(0,0,0,0.4); border: 1px solid var(--purple); color: white; }

        .btn-main {
            background: linear-gradient(45deg, var(--purple), var(--accent));
            border: none; color: white; padding: 16px; border-radius: 12px;
            font-weight: bold; cursor: pointer; font-family: 'Orbitron', sans-serif;
            text-transform: uppercase; width: 100%;
        }
        .btn-circle {
            width: 48px; height: 48px; border-radius: 50%; border: none;
            background: var(--accent); color: black; font-weight: bold; cursor: pointer;
        }

        #joystick-zone { position: fixed; bottom: 40px; left: 40px; z-index: 100; display: none; width: 150px; height: 150px; }
        #exit-btn { position: fixed; top: 20px; right: 20px; z-index: 101; display: none; background: #ff4444; border: none; border-radius: 50%; width: 40px; height: 40px; color: white; font-weight: bold; }

        #action-buttons-zone {
            position: fixed; bottom: 45px; right: 45px; z-index: 100;
            display: none; width: 140px; height: 140px;
        }
        .action-btn {
            position: absolute; width: 45px; height: 45px; border-radius: 50%;
            border: 2px solid var(--accent); background: rgba(5, 5, 10, 0.75);
            color: white; font-family: 'Orbitron'; font-weight: bold; font-size: 16px;
            cursor: pointer; box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
            display: flex; align-items: center; justify-content: center;
            user-select: none; -webkit-user-select: none;
        }
        #btn-Y { top: 0; left: 47px; border-color: #ffeb3b; color: #ffeb3b; }
        #btn-X { top: 47px; left: 0; border-color: #00f2ff; color: #00f2ff; }
        #btn-A { bottom: 0; left: 47px; border-color: #4caf50; color: #4caf50; }
        #btn-B { top: 47px; right: 0; border-color: #f44336; color: #f44336; }

        #inspector-panel {
            position: fixed; top: 20px; left: 20px; z-index: 200;
            background: var(--glass); padding: 15px; border-radius: 16px;
            border: 1px solid var(--accent); display: none; min-width: 180px;
            backdrop-filter: blur(10px);
        }
        .inspector-btn {
            background: rgba(255,255,255,0.1); border: 1px solid var(--accent);
            color: white; padding: 6px 10px; margin: 4px 2px; border-radius: 6px;
            cursor: pointer; font-size: 12px;
        }
        
        #project-mini-badge {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 150; background: rgba(5, 5, 10, 0.85); 
            width: 18px; height: 18px; 
            border-radius: 50%; border: 1px solid var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron'; font-size: 9px; font-weight: bold; color: var(--accent);
            box-shadow: 0 0 6px rgba(0, 242, 255, 0.3);
        }
    </style>
</head>
<body>

    <canvas id="world-canvas"></canvas>
    
    <div id="project-mini-badge">1</div>

    <div id="setup-screen">
        <div class="setup-box">
            <h1>NEXUS AI</h1>
            <p style="color: #888; font-size: 11px; letter-spacing: 2px;">CORE ACTIVATION</p>
            <input type="password" id="gemini-key" placeholder="Въведи Gemini API Key">
            <input type="password" id="groq-key" placeholder="Въведи Groq API Key (Опционално)">
            <input type="password" id="hf-key" placeholder="Въведи Hugging Face Key (Опционално)">
            <button class="btn-main" onclick="startEngine()">АКТИВИРАЙ СИСТЕМАТА</button>
        </div>
    </div>

    <div id="inspector-panel">
        <div id="inspector-name" style="font-family: 'Orbitron'; font-size: 14px; color: var(--accent); margin-bottom: 10px;">Обект: Няма</div>
        <button class="inspector-btn" onclick="Engine.modifySelected('scale', 1.2)">➕ Уголеми</button>
        <button class="inspector-btn" onclick="Engine.modifySelected('scale', 0.8)">➖ Намали</button>
        <br>
        <button class="inspector-btn" onclick="Engine.modifySelected('move', 'left')">⬅️</button>
        <button class="inspector-btn" onclick="Engine.modifySelected('move', 'right')">➡️</button>
        <button class="inspector-btn" onclick="Engine.modifySelected('move', 'forward')">⬆️</button>
        <button class="inspector-btn" onclick="Engine.modifySelected('move', 'backward')">⬇️</button>
        <br>
        <button class="inspector-btn" style="border-color: #ffca28; color: #ffca28;" onclick="Engine.copySelected()">📋 Копирай</button>
        <button class="inspector-btn" style="border-color: #ff4444; color: #ff4444;" onclick="Engine.deleteSelected()">🗑️ Изтрий</button>
        <br>
        <button class="inspector-btn" style="border-color: #888; width: 100%; margin-top: 5px;" onclick="Engine.deselectObject()">Затвори</button>
    </div>

    <button id="exit-btn" onclick="Engine.togglePlay(false)">✕</button>
    <div id="joystick-zone"></div>

    <div id="action-buttons-zone">
        <button id="btn-Y" class="action-btn">Y</button>
        <button id="btn-X" class="action-btn">X</button>
        <button id="btn-B" class="action-btn">B</button>
        <button id="btn-A" class="action-btn">A</button>
    </div>

    <div id="ui-layer">
        <div class="chat-container">
            <div id="chat-log">
                <div class="msg ai-msg"><b>NEXUS:</b> Системата е настроена! Денят вече е с тропически тюркоазен цвят в стил GTA Vice City. Напиши "направи ден" или "направи нощ".</div>
            </div>
            <div class="input-group">
                <input type="text" id="chat-input" placeholder="Комуникирай с AI...">
                <button id="send-btn" class="btn-circle" onclick="Engine.askAI()">></button>
            </div>
            <button class="btn-main" style="margin-top: 15px;" onclick="Engine.togglePlay(true)">РАЗГЛЕДАЙ СИМУЛАЦИЯТА</button>
        </div>
    </div>

    <script>
        class NexusEngine {
            constructor(keys) {
                this.keys = keys;
                this.isPlaying = false;
                this.soundEnabled = true;
                
                this.currentProjectSlot = 1;
                this.projectsData = {
                    1: { meshes: [], bodies: [], names: [] },
                    2: { meshes: [], bodies: [], names: [] }
                };

                this.clock = new THREE.Clock();
                this.dynamicBodies = [];
                this.dynamicMeshes = [];
                this.objectNames = [];
                this.frontWheels = []; 

                this.selectedMesh = null;
                this.selectedIndex = -1;

                this.cameraAngleX = 0;
                this.cameraAngleY = 0.3;
                this.cameraRadius = 25;

                // КОНТРОЛИ
                this.carAngle = 0; 
                this.carSpeed = 0; 
                this.steeringInput = 0; 
                this.gasInput = 0;      
                
                this.maxSpeed = 35;
                this.acceleration = 0.5;
                this.drag = 0.95;       

                this.isDragging = false;
                this.previousMousePosition = { x: 0, y: 0 };
                this.initialPinchDistance = null;

                this.initThree();
                this.initPhysics();
                this.initInteraction();
                this.initButtonEvents(); 
                this.loadSavedWorld();
                this.animate();
            }

            initThree() {
                this.scene = new THREE.Scene();
                // Стартираме директно с Vice City ден по подразбиране
                this.scene.background = new THREE.Color(0x00bfff);
                this.scene.fog = new THREE.Fog(0x00bfff, 40, 400);

                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                
                this.renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('world-canvas'), antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

                this.grid = new THREE.GridHelper(400, 50, 0xff00ff, 0x005588);
                this.scene.add(this.grid);

                this.ambientLight = new THREE.AmbientLight(0xfff0e0, 0.95);
                this.scene.add(this.ambientLight);

                this.light = new THREE.PointLight(0x00f2ff, 2.5, 120);
                this.light.position.set(0, 20, 0);
                this.scene.add(this.light);

                const celestialGeo = new THREE.SphereGeometry(7, 32, 32);
                const celestialMat = new THREE.MeshBasicMaterial({ color: 0xfffae0 });
                this.celestialBody = new THREE.Mesh(celestialGeo, celestialMat);
                this.celestialBody.position.set(0, 120, -130);
                this.scene.add(this.celestialBody);

                this.celestialLight = new THREE.DirectionalLight(0xffffff, 1.3);
                this.celestialLight.position.copy(this.celestialBody.position);
                this.scene.add(this.celestialLight);

                this.raycaster = new THREE.Raycaster();
                this.mouse = new THREE.Vector2();
            }

            setEnvironment(mode) {
                if (mode === 'day') {
                    // КОРИГИРАНО: Перфектен Vice City Ден (Тропическо синьо)
                    this.scene.background.setHex(0x00bfff);
                    this.scene.fog = new THREE.Fog(0x00bfff, 40, 400); 
                    this.ambientLight.color.setHex(0xfff0e0); // Топъл летен блясък
                    this.ambientLight.intensity = 0.95; 
                    this.celestialBody.material.color.setHex(0xfffae0); // Горещо слънце
                    this.celestialLight.color.setHex(0xffffff);
                    this.celestialLight.intensity = 1.3; 
                    this.logChat("Времето е променено на VICE CITY ДЕН. Слънчево и топло!", "ai");
                } else {
                    this.scene.background.setHex(0x140b2d);
                    this.scene.fog = new THREE.Fog(0x140b2d, 15, 350); 
                    this.ambientLight.color.setHex(0xffc2eb); 
                    this.ambientLight.intensity = 0.45; 
                    this.celestialBody.material.color.setHex(0x00f2ff); 
                    this.celestialLight.color.setHex(0xff00aa); 
                    this.celestialLight.intensity = 0.95; 
                    this.logChat("Времето е променено на VICE CITY НОЩ.", "ai");
                }
                this.playSound(600, 0.1);
            }

            initPhysics() {
                this.world = new CANNON.World();
                this.world.gravity.set(0, -9.82, 0);

                const groundMat = new CANNON.Material("groundMat");
                const objectMat = new CANNON.Material("objectMat");

                const contactMat = new CANNON.ContactMaterial(groundMat, objectMat, { friction: 0.6, restitution: 0.3 });
                this.world.addContactMaterial(contactMat);

                const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane(), material: groundMat });
                groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
                this.world.addBody(groundBody);

                const geo = new THREE.BoxGeometry(2, 2, 2);
                const mat = new THREE.MeshStandardMaterial({ color: 0x00f2ff, emissive: 0x00f2ff, emissiveIntensity: 0.4 });
                this.playerMesh = new THREE.Mesh(geo, mat);
                this.scene.add(this.playerMesh);

                this.playerBody = new CANNON.Body({ mass: 5, shape: new CANNON.Box(new CANNON.Vec3(1, 1, 1)), material: objectMat });
                this.playerBody.position.set(-4, 4, 0);
                this.world.addBody(this.playerBody);
                
                this.updateCameraPosition();
            }

            initInteraction() {
                const getPinchDist = (e) => {
                    if (e.touches.length < 2) return 0;
                    return Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                };

                const onPointerDown = (e) => {
                    if (e.touches && e.touches.length === 2) {
                        this.isDragging = false;
                        this.initialPinchDistance = getPinchDist(e);
                        return;
                    }

                    let clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    let clientY = e.clientY || (e.touches && e.touches[0].clientY);
                    if(!clientX || !clientY) return;

                    this.mouse.x = (clientX / window.innerWidth) * 2 - 1;
                    this.mouse.y = -(clientY / window.innerHeight) * 2 + 1;

                    this.raycaster.setFromCamera(this.mouse, this.camera);
                    const intersects = this.raycaster.intersectObjects(this.dynamicMeshes, true);

                    if (intersects.length === 0 && !this.isPlaying) {
                        this.isDragging = true;
                        this.previousMousePosition = { x: clientX, y: clientY };
                    } else if (intersects.length > 0 && !this.isPlaying) {
                        let hitObj = intersects[0].object;
                        while (hitObj.parent && hitObj.parent !== this.scene) {
                            hitObj = hitObj.parent;
                        }
                        this.selectedMesh = hitObj;
                        this.selectedIndex = this.dynamicMeshes.indexOf(this.selectedMesh);
                        
                        document.getElementById('inspector-panel').style.display = 'block';
                        document.getElementById('inspector-name').innerText = `Обект: ${this.objectNames[this.selectedIndex] || "Неизвестен"}`;
                    }
                };

                const onPointerMove = (e) => {
                    if (e.touches && e.touches.length === 2 && this.initialPinchDistance !== null) {
                        const currentDist = getPinchDist(e);
                        const factor = currentDist / this.initialPinchDistance;
                        if(factor > 1) this.cameraRadius -= 0.5;
                        else if(factor < 1) this.cameraRadius += 0.5;
                        this.cameraRadius = Math.max(5, Math.min(100, this.cameraRadius));
                        this.initialPinchDistance = currentDist;
                        this.updateCameraPosition();
                        return;
                    }

                    if (!this.isDragging) return;
                    let clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    let clientY = e.clientY || (e.touches && e.touches[0].clientY);

                    let deltaX = clientX - this.previousMousePosition.x;
                    let deltaY = clientY - this.previousMousePosition.y;

                    this.cameraAngleX -= deltaX * 0.005;
                    this.cameraAngleY += deltaY * 0.005;
                    this.cameraAngleY = Math.max(0.1, Math.min(Math.PI / 2 - 0.05, this.cameraAngleY));

                    this.previousMousePosition = { x: clientX, y: clientY };
                    this.updateCameraPosition();
                };

                const onPointerUp = () => { 
                    this.isDragging = false; 
                    this.initialPinchDistance = null; 
                };

                window.addEventListener('mousedown', onPointerDown);
                window.addEventListener('mousemove', onPointerMove);
                window.addEventListener('mouseup', onPointerUp);

                window.addEventListener('touchstart', onPointerDown, {passive: true});
                window.addEventListener('touchmove', onPointerMove, {passive: true});
                window.addEventListener('touchend', onPointerUp);
            }

            initButtonEvents() {
                const btnA = document.getElementById('btn-A');
                const btnB = document.getElementById('btn-B');

                const setGas = (val) => { if(this.isPlaying) this.gasInput = val; };

                btnA.addEventListener('mousedown', () => { setGas(1); this.playSound(500, 0.05); });
                btnA.addEventListener('mouseup', () => setGas(0));
                btnA.addEventListener('touchstart', (e) => { e.preventDefault(); setGas(1); });
                btnA.addEventListener('touchend', () => setGas(0));

                btnB.addEventListener('mousedown', () => { setGas(-1); this.playSound(350, 0.05); });
                btnB.addEventListener('mouseup', () => setGas(0));
                btnB.addEventListener('touchstart', (e) => { e.preventDefault(); setGas(-1); });
                btnB.addEventListener('touchend', () => setGas(0));
            }

            updateCameraPosition() {
                let targetMesh = (this.dynamicMeshes.length > 0) ? this.dynamicMeshes[this.dynamicMeshes.length - 1] : this.playerMesh;
                if(!targetMesh) return;

                if (this.isPlaying) {
                    const camOffsetZ = 14;
                    const camOffsetY = 5;
                    this.camera.position.set(
                        targetMesh.position.x - Math.sin(this.carAngle) * camOffsetZ,
                        targetMesh.position.y + camOffsetY,
                        targetMesh.position.z - Math.cos(this.carAngle) * camOffsetZ
                    );
                    this.camera.lookAt(targetMesh.position.x, targetMesh.position.y + 1, targetMesh.position.z);
                } else {
                    const offset = new THREE.Vector3(
                        this.cameraRadius * Math.sin(this.cameraAngleX) * Math.cos(this.cameraAngleY),
                        this.cameraRadius * Math.sin(this.cameraAngleY),
                        this.cameraRadius * Math.cos(this.cameraAngleX) * Math.cos(this.cameraAngleY)
                    );
                    this.camera.position.copy(targetMesh.position).add(offset);
                    this.camera.lookAt(targetMesh.position);
                }
            }

            deselectObject() {
                this.selectedMesh = null;
                this.selectedIndex = -1;
                document.getElementById('inspector-panel').style.display = 'none';
            }

            deleteSelected() {
                if (this.selectedIndex === -1 || !this.selectedMesh) return;
                
                const mesh = this.selectedMesh;
                const body = this.dynamicBodies[this.selectedIndex];

                this.scene.remove(mesh);
                this.world.removeBody(body);

                this.dynamicMeshes.splice(this.selectedIndex, 1);
                this.dynamicBodies.splice(this.selectedIndex, 1);
                this.objectNames.splice(this.selectedIndex, 1);

                this.deselectObject();
                this.saveWorldState();
                this.playSound(400, 0.2);
            }

            copySelected() {
                if (this.selectedIndex === -1 || !this.selectedMesh) return;

                const parentMesh = this.selectedMesh;
                const parentBody = this.dynamicBodies[this.selectedIndex];
                const originalName = this.objectNames[this.selectedIndex];

                const clonedMesh = parentMesh.clone();
                clonedMesh.position.copy(parentBody.position);
                clonedMesh.position.y += 4;
                this.scene.add(clonedMesh);

                const clonedBody = new CANNON.Body({
                    mass: parentBody.mass,
                    shape: new CANNON.Box(new CANNON.Vec3(1.4, 0.6, 2.6))
                });
                clonedBody.position.copy(parentBody.position);
                clonedBody.position.y += 4;
                this.world.addBody(clonedBody);

                this.dynamicMeshes.push(clonedMesh);
                this.dynamicBodies.push(clonedBody);
                this.objectNames.push(`${originalName} (Копие)`);

                this.deselectObject();
                this.saveWorldState();
                this.playSound(900, 0.1);
            }

            modifySelected(type, value) {
                if (this.selectedIndex === -1 || !this.selectedMesh) return;
                const body = this.dynamicBodies[this.selectedIndex];
                const mesh = this.selectedMesh;

                if (type === 'scale') {
                    mesh.scale.multiplyScalar(value);
                    body.shapes.forEach(shape => {
                        if (shape.halfExtents) shape.halfExtents.scale(value, shape.halfExtents);
                    });
                    body.updateBoundingRadius();
                } else if (type === 'move') {
                    const step = 1.5;
                    if (value === 'left') body.position.x -= step;
                    if (value === 'right') body.position.x += step;
                    if (value === 'forward') body.position.z -= step;
                    if (value === 'backward') body.position.z += step;
                }
                this.saveWorldState();
                this.playSound(600, 0.05);
            }

            switchProjectWindow(targetSlot) {
                if (this.currentProjectSlot === targetSlot) return;
                this.deselectObject();

                this.dynamicMeshes.forEach(mesh => this.scene.remove(mesh));
                this.dynamicBodies.forEach(body => this.world.removeBody(body));

                this.projectsData[this.currentProjectSlot] = {
                    meshes: [...this.dynamicMeshes],
                    bodies: [...this.dynamicBodies],
                    names: [...this.objectNames]
                };

                this.currentProjectSlot = targetSlot;
                const nextProject = this.projectsData[targetSlot];

                this.dynamicMeshes = nextProject.meshes;
                this.dynamicBodies = nextProject.bodies;
                this.objectNames = nextProject.names;

                this.dynamicMeshes.forEach(mesh => this.scene.add(mesh));
                this.dynamicBodies.forEach(body => this.world.removeBody(body));

                document.getElementById('project-mini-badge').innerText = targetSlot;
                
                this.playerBody.position.set(-4, 4, 0);
                this.playerBody.velocity.set(0, 0, 0);
                this.updateCameraPosition();
                this.saveWorldState();
                this.playSound(700, 0.15);
            }

            playSound(freq, duration) {
                if (!this.soundEnabled) return;
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(); osc.stop(ctx.currentTime + duration);
                } catch(e) {}
            }

            buildProceduralCar() {
                const carGroup = new THREE.Group();
                this.frontWheels = []; 

                const bodyMat = new THREE.MeshStandardMaterial({ color: 0x0a0a14, roughness: 0.1, metalness: 0.9 });
                const carbonMat = new THREE.MeshStandardMaterial({ color: 0x22222b, roughness: 0.4 });
                const glassMat = new THREE.MeshStandardMaterial({ color: 0x00f2ff, roughness: 0.0, transparent: true, opacity: 0.4 });
                const neonLightMat = new THREE.MeshStandardMaterial({ color: 0x00f2ff, emissive: 0x00f2ff, emissiveIntensity: 2.5 });
                const brakeLightMat = new THREE.MeshStandardMaterial({ color: 0xff0055, emissive: 0xff0055, emissiveIntensity: 2.5 });
                const wheelMat = new THREE.MeshStandardMaterial({ color: 0x14141a, roughness: 0.7 });
                const rimMat = new THREE.MeshStandardMaterial({ color: 0xbc13fe, metalness: 0.9, roughness: 0.2 });

                const chassisGeo = new THREE.BoxGeometry(2.6, 0.4, 5.2);
                const chassis = new THREE.Mesh(chassisGeo, bodyMat);
                chassis.position.y = 0.3;
                carGroup.add(chassis);

                const hoodGeo = new THREE.BoxGeometry(2.4, 0.25, 1.6);
                const hood = new THREE.Mesh(hoodGeo, bodyMat);
                hood.position.set(0, 0.45, 1.6); 
                carGroup.add(hood);

                const cabinGeo = new THREE.BoxGeometry(2.2, 0.65, 2.2);
                const cabin = new THREE.Mesh(cabinGeo, glassMat);
                cabin.position.set(0, 0.85, -0.3);
                carGroup.add(cabin);

                const roofGeo = new THREE.BoxGeometry(2.1, 0.05, 2.0);
                const roof = new THREE.Mesh(roofGeo, carbonMat);
                roof.position.set(0, 1.18, -0.3);
                carGroup.add(roof);

                const spoilerStrutGeo = new THREE.BoxGeometry(1.8, 0.4, 0.2);
                const struts = new THREE.Mesh(spoilerStrutGeo, carbonMat);
                struts.position.set(0, 0.6, -2.3);
                carGroup.add(struts);

                const wingGeo = new THREE.BoxGeometry(2.7, 0.05, 0.4);
                const wing = new THREE.Mesh(wingGeo, carbonMat);
                wing.position.set(0, 0.8, -2.4);
                carGroup.add(wing);

                const headlightGeo = new THREE.BoxGeometry(0.6, 0.08, 0.1);
                const leftHeadlight = new THREE.Mesh(headlightGeo, neonLightMat);
                leftHeadlight.position.set(0.9, 0.45, 2.6);
                const rightHeadlight = leftHeadlight.clone();
                rightHeadlight.position.x = -0.9;
                carGroup.add(leftHeadlight, rightHeadlight);

                const tailLightGeo = new THREE.BoxGeometry(2.3, 0.06, 0.1);
                const tailLight = new THREE.Mesh(tailLightGeo, brakeLightMat);
                tailLight.position.set(0, 0.45, -2.6);
                carGroup.add(tailLight);

                const wheelGeo = new THREE.CylinderGeometry(0.55, 0.55, 0.45, 32);
                wheelGeo.rotateZ(Math.PI / 2); 
                const rimGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.47, 16);
                rimGeo.rotateZ(Math.PI / 2);

                const wheelPositions = [
                    { x: 1.4, z: 1.6, isFront: true },  { x: -1.4, z: 1.6, isFront: true }, 
                    { x: 1.4, z: -1.5, isFront: false }, { x: -1.4, z: -1.5, isFront: false } 
                ];

                wheelPositions.forEach(pos => {
                    const wGroup = new THREE.Group();
                    const tire = new THREE.Mesh(wheelGeo, wheelMat);
                    const rim = new THREE.Mesh(rimGeo, rimMat);
                    wGroup.add(tire, rim);
                    wGroup.position.set(pos.x, 0.25, pos.z);
                    
                    carGroup.add(wGroup);

                    if (pos.isFront) {
                        this.frontWheels.push(wGroup); 
                    }
                });

                return carGroup;
            }

            async generate3DModel(prompt) {
                this.logChat(`Сглобяване на 3D модел за: "${prompt}"...`, "ai");
                
                setTimeout(() => {
                    let finalMesh;
                    let isCar = /кол|car|автомобил/i.test(prompt);

                    if (isCar) {
                        finalMesh = this.buildProceduralCar();
                    } else {
                        const geo = new THREE.DodecahedronGeometry(1.5);
                        const mat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff });
                        finalMesh = new THREE.Mesh(geo, mat);
                    }

                    this.scene.add(finalMesh);

                    const physBody = new CANNON.Body({ 
                        mass: 6, 
                        shape: new CANNON.Box(new CANNON.Vec3(1.4, 0.6, 2.6)) 
                    });
                    physBody.position.set(0, 4, 0);
                    this.world.addBody(physBody);

                    this.dynamicMeshes.push(finalMesh); 
                    this.dynamicBodies.push(physBody); 
                    this.objectNames.push(isCar ? "Кибер Спорткар" : prompt.substring(0, 15));
                    
                    this.logChat(`Обектът е добавен успешно!`, "ai");
                    this.saveWorldState();
                    this.playSound(800, 0.1);
                }, 800);
            }

            saveWorldState() {
                const backup = {
                    slot1: this.projectsData[1].meshes.map((m, i) => this.getSerializableObj(m, this.projectsData[1].bodies[i], this.projectsData[1].names[i])),
                    slot2: this.projectsData[2].meshes.map((m, i) => this.getSerializableObj(m, this.projectsData[2].bodies[i], this.projectsData[2].names[i])),
                    currentActive: this.currentProjectSlot
                };
                backup[`slot${this.currentProjectSlot}`] = this.dynamicMeshes.map((m, i) => this.getSerializableObj(m, this.dynamicBodies[i], this.objectNames[i]));
                localStorage.setItem('nexus_multi_window_backup', JSON.stringify(backup));
            }

            getSerializableObj(mesh, body, name) {
                return {
                    name: name,
                    pos: { x: body.position.x, y: body.position.y, z: body.position.z },
                    scale: { x: mesh.scale.x, y: mesh.scale.y, z: mesh.scale.z },
                    isCar: name.includes("Кола") || name.includes("Спорткар")
                };
            }

            loadSavedWorld() {
                const saved = localStorage.getItem('nexus_multi_window_backup');
                if(!saved) return;
                try {
                    const backup = JSON.parse(saved);
                    this.currentProjectSlot = backup.currentActive || 1;
                    document.getElementById('project-mini-badge').innerText = this.currentProjectSlot;

                    [1, 2].forEach(slot => {
                        const rawData = backup[`slot${slot}`] || [];
                        rawData.forEach(obj => {
                            let mesh = obj.isCar ? this.buildProceduralCar() : new THREE.Mesh(new THREE.DodecahedronGeometry(1.5), new THREE.MeshStandardMaterial({color: 0x00f2ff}));
                            mesh.scale.set(obj.scale.x, obj.scale.y, obj.scale.z);

                            const body = new CANNON.Body({ mass: 6, shape: new CANNON.Box(new CANNON.Vec3(1.4, 0.6, 2.6)) });
                            body.position.set(obj.pos.x, obj.pos.y, obj.pos.z);

                            this.projectsData[slot].meshes.push(mesh);
                            this.projectsData[slot].bodies.push(body);
                            this.projectsData[slot].names.push(obj.name);

                            if (slot === this.currentProjectSlot) {
                                this.scene.add(mesh);
                                this.world.addBody(body);
                                this.dynamicMeshes.push(mesh);
                                this.dynamicBodies.push(body);
                                this.objectNames.push(obj.name);
                            }
                        });
                    });
                } catch(e) {}
            }

            async askAI() {
                const input = document.getElementById('chat-input');
                const btn = document.getElementById('send-btn');
                const text = input.value.trim();
                if(!text || btn.disabled) return;
                
                const lowerText = text.toLowerCase();
                this.logChat(text, "user");
                input.value = "";

                if(/нощ|луна|тъмно/i.test(lowerText)) { this.setEnvironment('night'); return; }
                if(/ден|слънце|светло/i.test(lowerText)) { this.setEnvironment('day'); return; }
                
                if(/ресет|изчисти.*система|reset/i.test(lowerText)) { this.reset(); return; }
                if(/нов.*проект|new.*project|прозорец.*2/i.test(lowerText)) { this.switchProjectWindow(2); return; }
                if(/върни.*проект|зареди.*проект.*1|прозорец.*1/i.test(lowerText)) { this.switchProjectWindow(1); return; }
                if(/генерир|създа|модел|кола/i.test(lowerText)) { this.generate3DModel(text); return; }

                btn.disabled = true;
                const loadingMsg = this.logChat("NEXUS мисли...", "ai");
                
                if(this.keys.gemini) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${this.keys.gemini}`, {
                            method: 'POST', headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                        });
                        if (response.ok) { const data = await response.json(); loadingMsg.remove(); this.logChat(data.candidates[0].content.parts[0].text, "ai"); }
                    } catch(e) { loadingMsg.remove(); this.logChat("ГРЕШКА при обработка.", "error"); }
                }
                btn.disabled = false;
            }

            logChat(msg, type) {
                const log = document.getElementById('chat-log');
                const div = document.createElement('div');
                div.className = `msg ${type === 'ai' ? 'ai-msg' : (type === 'error' ? 'error-msg' : 'user-msg')}`;
                div.innerHTML = type === 'ai' ? `<b>NEXUS:</b> ${msg}` : msg;
                log.appendChild(div); log.scrollTop = log.scrollHeight;
                return div;
            }

            togglePlay(state) {
                this.isPlaying = state;
                if(state) this.deselectObject();
                document.getElementById('ui-layer').style.display = state ? 'none' : 'flex';
                document.getElementById('joystick-zone').style.display = state ? 'block' : 'none';
                document.getElementById('action-buttons-zone').style.display = state ? 'block' : 'none'; 
                document.getElementById('exit-btn').style.display = state ? 'block' : 'none';

                if(state) {
                    this.manager = nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '75px', bottom: '75px'}, color: '#00f2ff' });
                    this.manager.on('move', (e, data) => {
                        this.steeringInput = Math.cos(data.angle.radian) * data.force;
                    });
                    this.manager.on('end', () => { 
                        this.steeringInput = 0; 
                    });
                } else if(this.manager) {
                    this.manager.destroy();
                }
            }

            reset() { localStorage.clear(); location.reload(); }

            animate() {
                requestAnimationFrame(() => this.animate());

                let targetBody = (this.dynamicBodies.length > 0) ? this.dynamicBodies[this.dynamicBodies.length - 1] : this.playerBody;
                
                if (this.isPlaying && targetBody) {
                    if (this.gasInput !== 0) {
                        this.carSpeed += this.gasInput * this.acceleration;
                    } else {
                        this.carSpeed *= this.drag; 
                    }

                    this.carSpeed = Math.max(-this.maxSpeed / 2, Math.min(this.maxSpeed, this.carSpeed));

                    if (Math.abs(this.carSpeed) > 1) {
                        const directionFactor = this.carSpeed > 0 ? 1 : -1;
                        this.carAngle -= this.steeringInput * 0.04 * directionFactor;
                    }

                    this.frontWheels.forEach(wheel => {
                        wheel.rotation.y = -this.steeringInput * 0.4;
                    });

                    targetBody.quaternion.setFromAxisAngle(new CANNON.Vec3(0, 1, 0), this.carAngle);
                    
                    targetBody.velocity.x = Math.sin(this.carAngle) * this.carSpeed;
                    targetBody.velocity.z = Math.cos(this.carAngle) * this.carSpeed;
                }

                this.world.step(1/60);

                for(let i=0; i<this.dynamicMeshes.length; i++) {
                    this.dynamicMeshes[i].position.copy(this.dynamicBodies[i].position);
                    this.dynamicMeshes[i].quaternion.copy(this.dynamicBodies[i].quaternion);
                }

                if(this.playerMesh && this.playerBody) {
                    this.playerMesh.position.copy(this.playerBody.position);
                    this.playerMesh.quaternion.copy(this.playerBody.quaternion);
                }

                let activeMesh = (this.dynamicMeshes.length > 0) ? this.dynamicMeshes[this.dynamicMeshes.length - 1] : this.playerMesh;
                if(activeMesh) {
                    if(this.isPlaying) {
                        this.updateCameraPosition();
                        this.light.position.set(activeMesh.position.x, activeMesh.position.y + 15, activeMesh.position.z);
                    }
                }

                this.renderer.render(this.scene, this.camera);
            }
        }

        function startEngine() {
            const gemini = document.getElementById('gemini-key').value.trim();
            const groq = document.getElementById('groq-key').value.trim();
            const hf = document.getElementById('hf-key').value.trim();
            if(!gemini) return alert("Въведи Gemini API ключ!");
            localStorage.setItem('n_g', gemini); localStorage.setItem('n_groq', groq); localStorage.setItem('n_hf', hf);
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            window.Engine = new NexusEngine({ gemini, groq, hf });
        }

        window.onload = () => {
            if(localStorage.getItem('n_g')) document.getElementById('gemini-key').value = localStorage.getItem('n_g');
            if(localStorage.getItem('n_groq')) document.getElementById('groq-key').value = localStorage.getItem('n_groq');
            if(localStorage.getItem('n_hf')) document.getElementById('hf-key').value = localStorage.getItem('n_hf');
        };
    </script>
</body>
</html>
